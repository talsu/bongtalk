server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hash-fingerprinted assets — cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Resolve real files and directory index.html (e.g. /prd/, /design-system/)
    # first; only genuinely unknown paths fall back to the SPA index.html so
    # client-side routing keeps working. $uri/ is what lets a trailing-slash
    # directory request serve its own index.html instead of the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
