server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hash-fingerprinted assets — cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any non-asset path serves index.html.
    location / {
        try_files $uri /index.html;
    }
}
