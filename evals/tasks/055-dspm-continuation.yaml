  으로 잔여 HIGH 갭 4건 (link unfurl / channel mute / group DM / custom
  status) + reviewer 발견 H1 (pin-cap-race) + H2 (visual baseline 미시드)
  + pinned UI 누락을 처리합니다. parity 86% → ≥ 90% AND HIGH 갭 = 0
  (또는 cap 10 / 2 iter convergence < 1%) 까지 strict 종료.

