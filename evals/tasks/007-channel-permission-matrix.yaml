id: 007
title: Channel endpoints enforce permission matrix
goal: |
  Verify channel and category endpoints reject requests from insufficient
  roles with the correct errorCode, per the single-source PERMISSION_MATRIX
  used by apps/api/test/int/workspaces/permissions.matrix.int.spec.ts.
dod:
  - command: pnpm --filter @qufox/api test:int
    expect: exit 0
  - scope_allow:
      - apps/api/src/channels/**
      - apps/api/test/int/channels/**
      - apps/api/test/int/workspaces/permission-matrix.data.ts
max_turns: 25
