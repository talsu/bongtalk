id: 053-polish-loop-5
title: Polish Loop 5 — Channels + DMs (Round 0 absorb + 8 dim × ≤3 round)
goal: |
  Second polish iteration over the channel/DM critical path. Round 0
  absorbs 7 deferred TODO(task-041-follow-*) items as fix-forward; the
  8 dimensions (Visual / A11y / Error / Edge / Mobile / Channel / DM /
  Performance) then run audit-and-fix until convergence (2 rounds 0
  BLOCKER + 0 HIGH per dim) or cap (24 rounds total). Performance is
  qualitative only — Lighthouse-CI infrastructure remains future work.
  DS 4 files stay byte-identical to 040 baseline.

dod:
  - 'pnpm verify exits 0 at loop end'
  - 'Round 0 — 7 follow items processed or explicitly carried with reason'
  - '8 dimension matrix filled (converged or cap-stopped)'
  - 'All BLOCKER + HIGH fixed or carried via TODO(task-042-follow-*)'
  - 'Each fix has a regression spec (unit / int / e2e)'
  - 'DS 4 files md5 == .task-040-ds-baseline.txt (git diff 0)'
  - 'Round logs docs/tasks/042-round-{0,N-<dim>}.md cumulative'
  - '3 artefacts: 042-*.md / 042-*.PR.md / 042-*.review.md'
  - 'reviewer subagent spawned exactly once with transcript token count'
  - 'develop merged to main once at loop end (auto-promote via webhook)'
  - '/volume2/dockers/qufox-deploy/.deploy/audit.jsonl last entry
    exitCode=0 + sha matches main tip'
  - 'GET https://qufox.com/api/readyz returns 200 + idle 30s'
  - 'Pane 1 auto-forward fires exactly once after FINAL REPORT'
  - 'FINAL REPORT prints Round 0 table + dimension matrix +
    040↔042 diff summary + perf qualitative baseline +
    follow-up TODO list'

scoring:
  verify_green: 0.15
  round0_complete: 0.15
  dimension_matrix_complete: 0.15
  regression_spec_per_fix: 0.10
  ds_files_untouched: 0.10
  reviewer_subagent_spawned: 0.05
  main_promotion_clean: 0.10
  pane1_forward_fired: 0.05
  follow_up_carry_explicit: 0.05
  perf_qualitative_recorded: 0.05
  final_report_complete: 0.05

tags: [polish, loop, pl5, channels, dms, accessibility]
