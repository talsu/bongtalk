services:
  postgres:
    image: postgres:16-alpine
    container_name: qufox-postgres
    environment:
      POSTGRES_USER: qufox
      POSTGRES_PASSWORD: qufox
      POSTGRES_DB: qufox
    ports:
      - '55432:5432'
    volumes:
      - qufox-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qufox -d qufox']
      interval: 5s
      timeout: 3s
      retries: 20
    profiles: ['dev']

  redis:
    image: redis:7-alpine
    container_name: qufox-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    profiles: ['dev']

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qufox
      POSTGRES_PASSWORD: qufox
      POSTGRES_DB: qufox_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qufox -d qufox_test']
      interval: 5s
      timeout: 3s
      retries: 20
    profiles: ['test']

  redis-test:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    profiles: ['test']

  postgres-e2e:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qufox
      POSTGRES_PASSWORD: qufox
      POSTGRES_DB: qufox_e2e
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qufox -d qufox_e2e']
      interval: 5s
      timeout: 3s
      retries: 20
    profiles: ['e2e']

  redis-e2e:
    image: redis:7-alpine
    ports:
      - '6381:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    profiles: ['e2e']

volumes:
  qufox-pgdata:
