version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      nestjs:
        patterns: ['@nestjs/*']
      react:
        patterns: ['react', 'react-dom', '@vitejs/*', 'vite']
      tooling:
        patterns: ['typescript', 'eslint*', 'prettier', 'turbo', 'vitest', 'tsx']
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
