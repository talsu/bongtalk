name: ci
on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.9.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @qufox/api exec prisma generate
      - run: pnpm verify
      - name: pnpm audit (prod, high+)
        run: pnpm audit --prod --audit-level=high || true
