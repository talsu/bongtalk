name: integration
on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  docker-umask-smoke:
    # Task-020-B: guard against a NAS-umask-0077 rebuild shipping 0600
    # files in prod images. The script forces umask 0077, builds both
    # api + web with --no-cache, then probes every regular file in the
    # built images for the world-read bit. Runs on every PR + push to
    # develop/main so a Dockerfile edit can't silently regress.
    #
    # Reviewer round-1 HIGH: `--no-cache` for two sequential multi-
    # stage builds (pnpm install + prisma generate + Vite) can take
    # 12-18 min on a cold ubuntu-latest runner; 30-min timeout gives
    # headroom without hiding a genuinely broken build.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Run Dockerfile umask smoke
        run: bash scripts/deploy/tests/dockerfile-umask-smoke.sh

  dist-css-link-smoke:
    # task-029-D: build the web app and assert dist/index.html links all
    # four DS stylesheets (tokens + components + mobile + icons). 029
    # shipped with mobile.css missing — every mobile viewport in prod
    # rendered without DS rules. Fail the build at CI so a regression
    # surfaces before the user does.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.9.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run DS stylesheet link smoke
        run: pnpm ds:smoke

  integration:
    # Integration tests use testcontainers to spin their own
    # postgres + redis — ubuntu-latest ships the docker daemon socket,
    # so no `services:` block is needed. Ryuk is disabled to match the
    # NAS pattern (see apps/api/test/int/*/helpers.ts).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TESTCONTAINERS_RYUK_DISABLED: 'true'
      TURBO_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.9.0
          cache: pnpm

      # Turbo remote cache lives on disk between runs so integration
      # re-runs on unchanged deps stay well under 5 minutes.
      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-int-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-int-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @qufox/api exec prisma generate

      - name: Run integration tests
        run: pnpm test:int
