name: integration
on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  integration:
    # Integration tests use testcontainers to spin their own
    # postgres + redis — ubuntu-latest ships the docker daemon socket,
    # so no `services:` block is needed. Ryuk is disabled to match the
    # NAS pattern (see apps/api/test/int/*/helpers.ts).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TESTCONTAINERS_RYUK_DISABLED: 'true'
      TURBO_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.9.0
          cache: pnpm

      # Turbo remote cache lives on disk between runs so integration
      # re-runs on unchanged deps stay well under 5 minutes.
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-int-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-int-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @qufox/api exec prisma generate

      - name: Run integration tests
        run: pnpm test:int
