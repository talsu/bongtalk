name: db-migrate
on:
  workflow_run:
    workflows: ["deploy-staging", "deploy-prod"]
    types: [requested]
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.9.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Migration dry-run
        run: echo "TODO(task-010): prisma migrate diff + apply on matching env"
