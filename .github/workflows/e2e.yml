name: e2e
on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # task-019-B (017-follow-2): run the full e2e suite twice per
    # commit — once with the beta invite gate OFF (open signup, the
    # current dev NAS shape) and once with it ON (production mode).
    # Both legs share the same compose stack; only BETA_INVITE_REQUIRED
    # flips, and the beta-invite-required.e2e.ts spec branches on it.
    strategy:
      fail-fast: false
      matrix:
        betaGate: [false, true]
    env:
      COMPOSE_FILE: docker-compose.test.yml
      BETA_INVITE_REQUIRED: ${{ matrix.betaGate }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.9.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @qufox/api exec prisma generate

      # Bring up the test stack (pg + redis + api + web) via the
      # dedicated compose file. Each service healthchecks itself; we
      # wait for the api /readyz to flip to 200 before handing off to
      # Playwright.
      # 071-M0 C12: safe-deploy 재설계로 `prisma migrate deploy` 가 컨테이너 부트에서
      # 제거된 뒤(apps/api/Dockerfile 참조) CI 에 마이그레이션 단계가 없어 test-api 가
      # 빈 DB 로 기동 실패(/readyz 영구 비200) — e2e 전체가 조용히 죽어 있었다.
      # 리뷰 H1: `up -d` 전체 기동은 빈 DB 에서 test-api healthcheck 실패로 비0 종료해
      # migrate 에 도달하지 못한다 — 데이터 서비스 → migrate → 앱 기동 순서 강제.
      - name: Build images
        run: docker compose -f ${COMPOSE_FILE} build

      - name: Start data services
        run: docker compose -f ${COMPOSE_FILE} up -d test-postgres test-redis test-minio test-minio-init

      - name: Run migrations (one-shot)
        run: |
          docker compose -f ${COMPOSE_FILE} run --rm --entrypoint prisma \
            test-api migrate deploy --schema=prisma/schema.prisma

      - name: Start app services
        run: docker compose -f ${COMPOSE_FILE} up -d

      - name: Wait for /readyz
        run: |
          set -e
          for i in $(seq 1 60); do
            code=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 3 http://localhost:43001/readyz || echo 000)
            if [ "$code" = "200" ]; then
              echo "api /readyz is 200"
              exit 0
            fi
            sleep 1
          done
          echo "api /readyz never returned 200"
          docker compose -f ${COMPOSE_FILE} logs --tail 200
          exit 1

      - name: Install Playwright browsers
        run: pnpm --filter @qufox/web exec playwright install --with-deps chromium

      # task-049 chunk D: `--project=chromium` 명시. 048 chunk D 가
      # baseURL 분기용으로 local-dev / local-dist / prod 3 project 를
      # 추가했는데, project filter 없이 `playwright test` 를 돌리면 모든
      # 테스트가 4 project 로 4× 실행되고, visual snapshot 은 `-chromium-
      # linux` baseline 만 존재하므로 나머지 3 project 에서 "snapshot
      # doesn't exist" 로 전부 fail (task-049 UNDERSTAND 진단으로 확정).
      # CI 는 단일 chromium project 로만 검증하고, prod / local-dist 는
      # baseline reseed 전용 (명시적 `--project=prod` 등) 으로 사용한다.
      - name: Run Playwright
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:45173
          VITE_API_URL: http://localhost:43001
        run: pnpm exec playwright test --project=chromium

      - name: Stack logs on failure
        if: failure()
        run: docker compose -f ${COMPOSE_FILE} logs --tail 500

      - name: Upload Playwright artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            apps/web/test-results/**
            apps/web/playwright-report/**

      - name: Shutdown
        if: always()
        run: docker compose -f ${COMPOSE_FILE} down -v
