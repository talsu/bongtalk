# Deploy-side stack: GitHub webhook receiver + backup cron runner.
# Runs ALONGSIDE docker-compose.prod.yml on the same NAS, sharing the
# `internal` bridge network so nginx-proxy-1 can route to qufox-webhook
# by container name.
#
# Bring up:
#   docker compose --env-file .env.deploy -f compose.deploy.yml up -d
#
# Intentionally a separate file (not merged into docker-compose.prod.yml)
# because the deploy stack has different failure semantics: if it goes
# down, the app keeps serving; the app is recoverable by hand via
# scripts/prod-reload.sh. Decoupling stops a webhook crash from looking
# like an app outage.

services:
  qufox-webhook:
    build:
      context: .
      dockerfile: services/webhook/Dockerfile
    image: qufox/webhook:latest
    container_name: qufox-webhook
    restart: unless-stopped
    # Two env files: .env.deploy provides webhook-specific secrets
    # (HMAC secret, Slack URL, branch allowlist). .env.prod provides
    # POSTGRES_PASSWORD, which auto-deploy.sh's `docker compose run
    # qufox-api pnpm db:migrate` step needs for compose interpolation
    # of the qufox-api service's DATABASE_URL.
    env_file:
      - .env.deploy
      - .env.prod
    environment:
      # REPO_PATH inside the container == bind mount path below.
      REPO_PATH: /repo
      WEBHOOK_AUDIT_PATH: /repo/.deploy/audit.jsonl
    ports:
      # Host-bound to 127.0.0.1 only — public traffic arrives via the
      # `/hooks/github` location inside the existing qufox.com nginx
      # server block (task-016 ops: no deploy.qufox.com subdomain).
      # The loopback bind stays so internal-metrics tooling on the NAS
      # host can reach /internal/* without going through nginx.
      - '127.0.0.1:${WEBHOOK_PORT:-9000}:9000'
    volumes:
      # task-017-B: dedicated worktree at ${DEPLOY_WORKTREE} (default
      # /volume2/dockers/qufox-deploy). Host's /volume2/dockers/qufox
      # is operator-owned; webhook's `git checkout --force <sha>`
      # previously dragged THAT tree into detached HEAD every deploy.
      # Worktree isolation solves it: both trees share objects + refs
      # via git's `.git/worktrees/` pointer but have independent HEAD
      # + index + working files.
      #
      # IMPORTANT: the worktree must exist before `docker compose up`.
      # Run `scripts/setup/migrate-webhook-worktree.sh` once on the
      # NAS to create it. The script is idempotent so re-runs are
      # cheap.
      - ${DEPLOY_WORKTREE:-/volume2/dockers/qufox-deploy}:/repo
      # Docker daemon socket — the webhook invokes `docker compose` via
      # the host daemon to rebuild qufox-api / qufox-web. This is
      # effectively root-equivalent on the host, so the HMAC gate is
      # load-bearing.
      - /var/run/docker.sock:/var/run/docker.sock
      # GitHub deploy key for `git fetch` inside auto-deploy.sh. Operator
      # generates a read-only deploy key (ssh-keygen -t ed25519 -f
      # /volume1/secrets/qufox-deploy-key), adds the .pub to the repo's
      # Deploy Keys, and chmod 0600s the private key. The webhook image
      # runs as root, so /root/.ssh is the default lookup path.
      # Path is env-configurable so operators can point at a host
      # directory they already manage (e.g. /volume1/secrets/qufox-ssh).
      - ${WEBHOOK_SSH_DIR:-/volume1/secrets/qufox-ssh}:/root/.ssh:ro
    networks: [internal]

  qufox-backup:
    build:
      context: .
      dockerfile: services/backup/Dockerfile
    image: qufox/backup:latest
    container_name: qufox-backup
    restart: unless-stopped
    env_file: [.env.deploy]
    environment:
      # Repeated from .env.deploy for clarity — these need to be in
      # scope for the cron-invoked shell scripts.
      BACKUP_DIR: /backups
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD for backup access}
      # task-012-F MinIO backup schedule. Every 4h matches the SLA:
      # "data is at most 4h stale" per the task contract.
      BACKUP_CRON_MINIO: ${BACKUP_CRON_MINIO:-0 */4 * * *}
      RESTORE_TEST_CRON_MINIO: ${RESTORE_TEST_CRON_MINIO:-15 4 * * 0}
      # task-012-G orphan GC: nightly at 04:30 UTC.
      ORPHAN_GC_CRON: ${ORPHAN_GC_CRON:-30 4 * * *}
      # API credentials for the orphan GC script (same S3_* env the
      # api uses to presign; mirrored from .env.prod via the env_file
      # at bring-up).
      S3_ENDPOINT: ${S3_ENDPOINT:-http://qufox-minio:9000}
      S3_BUCKET: ${S3_BUCKET:-qufox-attachments}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-qufox-api}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY via scripts/setup/init-minio.sh}
      DATABASE_URL: postgresql://qufox:${POSTGRES_PASSWORD}@qufox-postgres-prod:5432/qufox?schema=public
    volumes:
      - ${BACKUP_DIR:-/volume3/qufox-data/backups/qufox}:/backups
      # Postgres data dir — read-only, just for consistency spot-checks
      # (not used by db-backup.sh which goes through the network).
      - qufox-prod-pgdata:/pgdata:ro
      # task-012-F: MinIO data dir, read-only, so minio-backup.sh can
      # rsync --link-dest straight off the disk without going through
      # the network. Backups land under $BACKUP_DIR/minio/<YYYY-MM-DDTHH>/.
      - ${MINIO_DATA_DIR:-/volume3/qufox-data/minio}:/minio-data:ro
      # Docker socket so restore-test.sh can spin an ephemeral postgres
      # (+ minio-restore-test.sh an ephemeral minio).
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [internal]

networks:
  internal:
    external: true

volumes:
  qufox-prod-pgdata:
    external: true
    # Name must match the volume created by docker-compose.prod.yml.
    # Compose prepends the project name by default, so we reference the
    # fully-qualified name here.
    name: qufox_qufox-prod-pgdata
