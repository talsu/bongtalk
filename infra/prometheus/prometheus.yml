# Prometheus config for the Synology NAS deployment (separate from the
# K8s-based infra/k8s/monitoring/servicemonitor.yaml which pulls the
# same metrics via ServiceMonitor CRDs once qufox moves onto a cluster).
# Drop this into the Prometheus container's /etc/prometheus/prometheus.yml
# mount. (Deploy alert rules were retired with the webhook in task-076.)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # qufox-api /metrics — Prometheus exposition format, already wired
  # from task-007. Service resolves inside the `internal` docker network.
  - job_name: qufox-api
    metrics_path: /metrics
    static_configs:
      - targets: ['qufox-api:3001']
        labels:
          service: qufox-api
          env: prod

  # (qufox-webhook scrape removed in task-076 — webhook deploy stack retired;
  #  production is deployed locally via scripts/deploy/deploy.sh.)
