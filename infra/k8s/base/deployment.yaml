apiVersion: apps/v1
kind: Deployment
metadata:
  name: qufox-api
  labels: { app: qufox-api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: qufox-api }
  template:
    metadata:
      labels: { app: qufox-api }
    spec:
      containers:
        - name: api
          image: ghcr.io/talsu/qufox-api:latest # TODO(task-010): ECR + tag
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 15
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { cpu: 1, memory: 1Gi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qufox-web
  labels: { app: qufox-web }
spec:
  replicas: 2
  selector:
    matchLabels: { app: qufox-web }
  template:
    metadata:
      labels: { app: qufox-web }
    spec:
      containers:
        - name: web
          image: ghcr.io/talsu/qufox-web:latest # TODO(task-010)
          ports:
            - name: http
              containerPort: 80
