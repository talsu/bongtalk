apiVersion: v1
kind: Service
metadata: { name: qufox-api }
spec:
  selector: { app: qufox-api }
  ports: [{ name: http, port: 80, targetPort: http }]
---
apiVersion: v1
kind: Service
metadata: { name: qufox-web }
spec:
  selector: { app: qufox-web }
  ports: [{ name: http, port: 80, targetPort: http }]
