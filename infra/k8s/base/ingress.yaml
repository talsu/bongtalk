apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qufox
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
spec:
  rules:
    - host: qufox.example.com # TODO(task-010)
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: qufox-api, port: { name: http } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: qufox-web, port: { name: http } } }
