# Production stack for qufox.com. Joins the shared `internal` bridge network so
# the existing nginx-proxy-1 (in /volume2/dockers/nginx) can reach these
# containers by name. Postgres + Redis are dedicated prod instances so dev can
# keep running on the same host without data contamination.
services:
  qufox-postgres-prod:
    image: postgres:16-alpine
    container_name: qufox-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: qufox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
      POSTGRES_DB: qufox
    # task-036-D: enable WAL archiving for PITR. archive_command ships
    # each closed WAL segment into /volume3/qufox-data/backups/pg-wal
    # via the bind mount below. wal_level=replica is the minimum needed
    # for archive_mode=on; the backup script (scripts/backup/pg-base-
    # backup.sh) pairs this with a weekly pg_basebackup.
    command:
      - 'postgres'
      - '-c'
      - 'wal_level=replica'
      - '-c'
      - 'archive_mode=on'
      - '-c'
      - 'archive_command=test ! -f /wal-archive/%f && cp %p /wal-archive/%f'
      - '-c'
      - 'archive_timeout=300'
      - '-c'
      - 'max_wal_senders=3'
    volumes:
      - qufox-prod-pgdata:/var/lib/postgresql/data
      - /volume3/qufox-data/backups/pg-wal:/wal-archive
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qufox -d qufox']
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [internal]

  qufox-redis-prod:
    image: redis:7-alpine
    container_name: qufox-redis-prod
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [internal]

  qufox-api:
    # Pull-based deploy (safe-deploy redesign pillar A): the image is built by
    # the isolated qufox-builder and pulled from the local registry — the prod
    # daemon NEVER builds, so per-layer btrfs subvolume churn (the 2026-06
    # metadata-exhaustion runaway) cannot recur. Tag overridable via
    # QUFOX_API_TAG (rollout/rollback retag :latest in the registry).
    image: localhost:5050/qufox/api:${QUFOX_API_TAG:-latest}
    container_name: qufox-api
    # on-failure:5 bounds a crash loop instead of unless-stopped's infinite
    # retry. Paired with removing the boot-time `prisma migrate deploy` from
    # the image CMD (migrations now run as a one-shot pre-deploy step), the api
    # can no longer self-restart into the failure loop that amplified the
    # runaway.
    restart: on-failure:5
    env_file: [.env.prod]
    environment:
      NODE_ENV: production
      API_PORT: '3001'
      DATABASE_URL: postgresql://qufox:${POSTGRES_PASSWORD:?}@qufox-postgres-prod:5432/qufox?schema=public
      REDIS_URL: redis://qufox-redis-prod:6379
      CORS_ORIGINS: https://qufox.com
    # Resource ceilings so a misbehaving release can't starve the NAS.
    # NOTE: this DSM kernel reports "No cpu cfs quota support", so `cpus:` is
    # unsupported (NanoCPUs error) and intentionally omitted — only mem_limit
    # and pids_limit are honoured here.
    mem_limit: 1g
    pids_limit: 256
    healthcheck:
      # busybox wget ships in the node:alpine runtime. /healthz is liveness
      # only (no DB/Redis) so a slow dependency doesn't flap the container;
      # the deploy gate polls /readyz externally for readiness.
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/healthz >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      qufox-postgres-prod:
        condition: service_healthy
      qufox-redis-prod:
        condition: service_healthy
    networks: [internal]

  qufox-web:
    # Pull-based deploy (see qufox-api above). Built by qufox-builder, pulled
    # from the local registry; the prod daemon never builds.
    image: localhost:5050/qufox/web:${QUFOX_WEB_TAG:-latest}
    container_name: qufox-web
    restart: on-failure:5
    mem_limit: 256m
    pids_limit: 128
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:80/ >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      qufox-api:
        condition: service_healthy
    networks: [internal]

  # task-012-F: single-tenant MinIO for attachments + any future user
  # uploads. Dev/prod use the same shape (no AWS). Data lives on the
  # large /volume3 disk at /volume3/qufox-data/minio/; SHR/RAID at the
  # volume level provides the redundancy. HA / distributed mode is a
  # future task once attachment availability becomes a hard SLA.
  qufox-minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: qufox-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set in .env.prod}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env.prod}
      # NOTE (ops, 2026-04-20): MinIO refuses MINIO_SERVER_URL values
      # with a path suffix (e.g. `/attachments`), so the browser-facing
      # public URL is managed entirely by the API's S3_PUBLIC_ENDPOINT
      # presign path + the nginx `/attachments/*` rewrite. MinIO itself
      # only needs the root host, which it derives from the incoming
      # request when nginx forwards it.
      MINIO_API_CORS_ALLOW_ORIGIN: https://qufox.com
    volumes:
      - /volume3/qufox-data/minio:/data
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [internal]

networks:
  internal:
    external: true

volumes:
  qufox-prod-pgdata:
